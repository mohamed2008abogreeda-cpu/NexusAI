name: NexusAI Cloud Build (Release)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: \${{ runner.os }}-gradle-\${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          \${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug & Release APK
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: NexusAI-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release Unsigned APK
      uses: actions/upload-artifact@v3
      with:
        name: NexusAI-Release-Unsigned-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        
    # Note: To fully sign the Release APK, you will need to map GitHub Secrets
    # (KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD) in Android configuration.
