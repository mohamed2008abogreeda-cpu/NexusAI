name: NexusAI Cloud Build (Release)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Set up Node.js for Internal Engine
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install embedded Node.js backend dependencies
      run: |
        cd app/src/main/assets/nodejs-project
        npm install


    - name: Build Debug & Release APK
      run: gradle assembleDebug assembleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NexusAI-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release Unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: NexusAI-Release-Unsigned-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        
    # Note: To fully sign the Release APK, you will need to map GitHub Secrets
    # (KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD) in Android configuration.
